<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script>
      try {
        const savedTheme = window.localStorage.getItem("the-shites-theme");
        if (savedTheme === "light" || savedTheme === "dark") {
          document.documentElement.dataset.theme = savedTheme;
        }
      } catch (_error) {}
    </script>
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="./assets/js/runtime-config.js"></script>
    <script src="./assets/js/config.js"></script>
  </head>
  <body class="app-body home-body">
    <main class="home-shell">
      <section class="home-utility-bar">
        <div class="home-utility-actions">
          <button class="ghost-button theme-toggle-button" id="themeToggleButton" type="button" aria-pressed="false">Switch to light</button>
          <div class="user-pill" id="userPill"></div>
          <button class="ghost-button" id="logoutButton" type="button">Log out</button>
        </div>
      </section>

      <section class="home-stage">
        <article class="home-mural-panel">
          <div class="home-mural-frame">
            <div class="home-mural-glow"></div>
            <img class="home-mural-logo" src="./assets/images/Main Logo.png" alt="The Shites logo">
          </div>

          <div class="home-center-copy">
            <p class="home-section-label">Home</p>
            <h1 id="pageTitle"></h1>
            <p class="muted home-center-subtitle" id="pageSubtitle"></p>
          </div>

          <div class="home-action-grid" id="homeLauncherGrid"></div>
        </article>
      </section>
    </main>

    <div class="toast-stack" id="toastStack"></div>
    <script type="module" src="./assets/js/dashboard.js"></script>
  </body>
</html>
